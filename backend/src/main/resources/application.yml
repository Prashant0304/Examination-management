server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: ia-marks-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ia_marks_db}
    username: ${DB_USER:ia_marks_user}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:CHANGE_THIS_SECRET_IN_PRODUCTION_MIN_32_CHARS_LONG}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY:900000}      # 15 min
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY:604800000} # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    com.university.iamarks: INFO
