server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS once you have a certificate configured (see README).
    # location / { return 301 https://$host$request_uri; }

    client_max_body_size 5m;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/health {
        proxy_pass http://backend:8080/actuator/health;
    }

    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server block (enable once you've obtained a certificate via certbot,
# see README "Production hosting" section). Example:
#
